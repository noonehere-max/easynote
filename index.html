<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Note</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-mark"></span>
                    <h1>Easy Note</h1>
                </div>
                <button class="btn-icon" id="btnTheme" title="Cambiar tema">
                    <span id="themeIcon">☾</span>
                </button>
            </div>

            <div class="sidebar-tools">
                <button class="btn-new" id="btnNew">
                    <span>Nueva nota</span>
                </button>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Buscar..." autocomplete="off">
                </div>
            </div>

            <div class="notes-list" id="notesList"></div>
        </aside>

        <main class="main-content">
            <div class="empty-state" id="emptyState">
                <div class="empty-circle"></div>
                <h2>Escribe algo</h2>
                <p>Tus notas se guardan automáticamente.</p>
            </div>

            <div class="editor" id="editor">
                <div class="editor-header">
                    <input type="text" id="noteTitle" class="note-title" placeholder="Título" autocomplete="off">
                    <button class="btn-icon btn-delete" id="btnDelete" title="Eliminar">
                        ✕
                    </button>
                </div>
                <textarea id="noteBody" class="note-body" placeholder="Escribe aquí..."></textarea>
            </div>
        </main>
    </div>

    <div class="toast" id="toast"></div>

    <script src="app.js"></script>
</body>
</html>
