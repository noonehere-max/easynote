<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Note</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">
                        <i class="fas fa-feather-alt"></i>
                    </div>
                    <h1>Easy Note</h1>
                </div>
                <button class="btn-new" id="btnNew" title="Nueva nota">
                    <i class="fas fa-plus"></i>
                    <span>Nueva</span>
                </button>
            </div>

            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Buscar notas..." autocomplete="off">
            </div>

            <div class="notes-list" id="notesList">
                <!-- Las notas se renderizan aquí -->
            </div>

            <div class="sidebar-footer">
                <span id="notesCount">0 notas</span>
                <button class="btn-theme" id="btnTheme" title="Cambiar tema">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="empty-state" id="emptyState">
                <div class="empty-illustration">
                    <i class="fas fa-sticky-note"></i>
                </div>
                <h2>Crea tu primera nota</h2>
                <p>Haz clic en "Nueva" para empezar a escribir. Tus notas se guardan automáticamente.</p>
            </div>

            <div class="editor" id="editor">
                <div class="editor-header">
                    <input type="text" id="noteTitle" class="note-title" placeholder="Título de la nota..." autocomplete="off">
                    <div class="editor-actions">
                        <span class="last-edited" id="lastEdited"></span>
                        <button class="btn-icon" id="btnCopy" title="Copiar contenido">
                            <i class="fas fa-copy"></i>
                        </button>
                        <button class="btn-icon btn-delete" id="btnDelete" title="Eliminar nota">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                </div>
                <textarea id="noteBody" class="note-body" placeholder="Escribe algo maravilloso..."></textarea>
            </div>
        </main>
    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast"></div>

    <script src="app.js"></script>
</body>
</html>
